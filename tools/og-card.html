<!-- Fonte do card OpenGraph (1200x630). Para regerar:
     chrome --headless=new --disable-gpu --hide-scrollbars --force-device-scale-factor=1 \n            --window-size=1200,630 --screenshot=assets/og-card.png tools/og-card.html
     (os caminhos de fonte/foto abaixo sao absolutos; ajuste se mover o projeto) -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<style>
  @font-face {
    font-family: "GeistMono";
    src: url("file:///C:/Users/thque/Documents/Leonel-Portfolio/assets/fonts/s.p_2.woff2") format("woff2");
    font-display: block;
  }
  @font-face {
    font-family: "GeistSans";
    src: url("file:///C:/Users/thque/Documents/Leonel-Portfolio/assets/fonts/s.p.woff2") format("woff2");
    font-display: block;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0a0e16;
    font-family: "GeistSans", "Segoe UI", system-ui, sans-serif;
    color: #e6edf3;
    position: relative;
  }
  /* grid backdrop */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(34,211,238,0.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,0.055) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse at 30% 50%, #000 35%, transparent 78%);
  }
  /* wind wall — veils of air on the right */
  .wall { position: absolute; right: 0; top: 0; bottom: 0; width: 560px; overflow: hidden; }
  .veil {
    position: absolute; top: -6%; height: 112%; width: 130px;
    background: linear-gradient(to top, rgba(207,250,254,0.34), rgba(165,243,252,0.16) 45%, transparent 88%);
    filter: blur(8px);
    border-radius: 50%;
  }
  .glow {
    position: absolute; right: 300px; top: -12%; height: 124%; width: 3px;
    background: linear-gradient(to bottom, transparent, rgba(207,250,254,0.85) 50%, transparent);
    box-shadow: 0 0 34px 9px rgba(34,211,238,0.4);
  }
  .content { position: relative; padding: 76px 0 0 82px; width: 720px; }
  .tag {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: "GeistMono", ui-monospace, Consolas, monospace;
    font-size: 17px; letter-spacing: 0.09em; color: #22d3ee;
    border: 1px solid rgba(34,211,238,0.35); background: rgba(34,211,238,0.07);
    padding: 9px 17px; border-radius: 5px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #05df72; box-shadow: 0 0 9px #05df72; }
  h1 { font-size: 82px; font-weight: 800; letter-spacing: -0.022em; margin-top: 32px; line-height: 1.02; }
  h1 .accent { background: linear-gradient(100deg, #22d3ee, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .role {
    font-family: "GeistMono", ui-monospace, Consolas, monospace;
    font-size: 30px; color: #7dd3fc; margin-top: 20px; letter-spacing: 0.012em;
  }
  .desc { font-size: 22px; color: #94a3b8; margin-top: 20px; line-height: 1.5; max-width: 640px; }
  .chips { display: flex; gap: 10px; margin-top: 32px; flex-wrap: nowrap; }
  .chip {
    font-family: "GeistMono", ui-monospace, Consolas, monospace;
    font-size: 15px; color: rgba(165,243,252,0.92);
    border: 1px solid rgba(34,211,238,0.26); background: rgba(34,211,238,0.06);
    padding: 8px 14px; border-radius: 4px; letter-spacing: 0.045em;
  }
  /* portrait */
  .photo-wrap { position: absolute; right: 118px; top: 172px; width: 286px; height: 286px; }
  .ring-a {
    position: absolute; inset: -16px; border-radius: 50%;
    border: 2px dashed rgba(34,211,238,0.42);
  }
  .ring-b {
    position: absolute; inset: -3px; border-radius: 50%;
    border: 2px solid rgba(59,130,246,0.5);
  }
  .photo {
    position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
    border: 3px solid rgba(34,211,238,0.85);
    box-shadow: 0 0 56px rgba(34,211,238,0.34);
  }
  .photo img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 18%; }
  /* footer bar */
  .foot {
    position: absolute; left: 82px; right: 82px; bottom: 52px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: "GeistMono", ui-monospace, Consolas, monospace; font-size: 19px;
    padding-top: 24px; border-top: 1px solid rgba(148,163,184,0.16);
  }
  .foot .url { color: #22d3ee; }
  .foot .pass { color: #05df72; }
</style>
</head>
<body>
  <div class="grid"></div>

  <div class="wall">
    <div class="veil" style="right: 60px;  opacity: 0.85;"></div>
    <div class="veil" style="right: 150px; opacity: 0.6; width: 96px;"></div>
    <div class="veil" style="right: 232px; opacity: 0.42; width: 76px;"></div>
    <div class="glow"></div>
  </div>

  <div class="content">
    <div class="tag"><span class="dot"></span>QUALITY_GATE :: ATIVO</div>
    <h1>Douglas <span class="accent">Leonel</span></h1>
    <div class="role">&lt;QA /&gt; Software Tester</div>
    <div class="desc">Qualidade de software e testes automatizados — barrando o bug antes que ele chegue ao usuário.</div>
    <div class="chips">
      <span class="chip">ROBOT FRAMEWORK</span>
      <span class="chip">SELENIUM</span>
      <span class="chip">PLAYWRIGHT</span>
      <span class="chip">BLUE TEAM</span>
    </div>
  </div>

  <div class="photo-wrap">
    <div class="ring-a"></div>
    <div class="ring-b"></div>
    <div class="photo">
      <img src="file:///C:/Users/thque/Documents/Leonel-Portfolio/assets/images/foto_leonel.jpg" alt=""/>
    </div>
  </div>

  <div class="foot">
    <span class="url">thqms.github.io/Portfolio-Leonel</span>
    <span class="pass">✓ 142 passed · 0 failed</span>
  </div>
</body>
</html>
